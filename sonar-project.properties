sonar.projectKey=ffxiv-mcp-xiv-lumina
sonar.projectName=mcp-xiv-lumina
sonar.projectVersion=1.0
sonar.sourceEncoding=UTF-8
sonar.host.url=http://localhost:9000

# Scope analysis to this project only (prevents sibling projects from being picked up).
sonar.sources=src/McpLumina
sonar.tests=tests/McpLumina.Tests

# Coverage: path to OpenCover XML generated by `dotnet test --collect:"XPlat Code Coverage"`.
# Run tests with FFXIV_GAME_PATH set before analysis to get integration test coverage.
sonar.cs.opencover.reportsPaths=TestResults/**/coverage.opencover.xml

sonar.exclusions=**/.git/**,**/.scannerwork/**,**/.sonarqube/**,**/.claude/**,**/.idea/**,**/.vscode/**,**/bin/**,**/obj/**,**/.nuget/**,**/.dotnet/**
sonar.test.exclusions=**/bin/**,**/obj/**
